services:
  postgres:
    image: postgres:16-alpine
    container_name: transapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: transapp
    ports:
      - "5434:5432"
    volumes:
      - transapp_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transapp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  transapp_postgres_data:
